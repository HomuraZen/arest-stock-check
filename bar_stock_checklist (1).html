<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A'REST Bar Stock Check</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f4f5f7; color: #1a1a2e; min-height: 100vh; }
  .header { background: #1a1a2e; color: white; padding: 20px 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .header p { font-size: 12px; opacity: 0.6; margin-top: 2px; }
  .meta-bar { background: white; padding: 16px 24px; border-bottom: 1px solid #e8e8e8; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .meta-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
  .meta-field label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .meta-field input, .meta-field select { border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 8px 12px; font-size: 14px; outline: none; transition: border 0.2s; background: #fafafa; }
  .meta-field input:focus, .meta-field select:focus { border-color: #1a1a2e; background: white; }
  .progress-wrap { background: white; padding: 10px 24px; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; gap: 12px; }
  .progress-bar { flex: 1; height: 6px; background: #eee; border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #4CAF50, #81C784); border-radius: 10px; transition: width 0.4s ease; }
  .progress-text { font-size: 12px; color: #888; white-space: nowrap; }
  .supplier-nav { display: flex; gap: 8px; padding: 14px 24px; overflow-x: auto; background: #f4f5f7; scrollbar-width: none; }
  .supplier-nav::-webkit-scrollbar { display: none; }
  .nav-pill { padding: 6px 14px; border-radius: 20px; border: 1.5px solid #ddd; background: white; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; color: #555; }
  .nav-pill:hover { border-color: #1a1a2e; color: #1a1a2e; }
  .nav-pill.done { background: #e8f5e9; border-color: #81C784; color: #2e7d32; }
  .content { padding: 16px 24px 100px; max-width: 760px; margin: 0 auto; }
  .supplier-block { background: white; border-radius: 14px; margin-bottom: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .supplier-header { padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
  .supplier-header h2 { font-size: 14px; font-weight: 700; color: #1a1a2e; }
  .supplier-meta { display: flex; align-items: center; gap: 10px; }
  .supplier-count { font-size: 11px; color: #aaa; }
  .supplier-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; background: #f0f0f0; color: #888; }
  .supplier-badge.done { background: #e8f5e9; color: #2e7d32; }
  .chevron { font-size: 12px; color: #aaa; transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }
  .item-list { border-top: 1px solid #f0f0f0; }
  .item-row { display: grid; grid-template-columns: 1fr 90px 80px 100px; gap: 8px; align-items: center; padding: 10px 20px; border-bottom: 1px solid #f7f7f7; transition: background 0.15s; }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: #fafafa; }
  .item-row.filled { background: #f9fffe; }
  .item-row.weekly { background: #f1faf1; }
  .item-row.weekly.filled { background: #e4f7e4; }
  .item-row.hidden { display: none; }
  .item-name { font-size: 13px; color: #333; display: flex; align-items: center; gap: 6px; }
  .weekly-dot { width: 7px; height: 7px; border-radius: 50%; background: #4CAF50; flex-shrink: 0; }
  .unit-badge { font-size: 11px; color: #888; background: #f0f0f0; border-radius: 6px; padding: 3px 8px; text-align: center; font-weight: 600; }
  .qty-input { border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 7px 10px; font-size: 14px; text-align: center; outline: none; width: 100%; transition: border 0.2s; }
  .qty-input:focus { border-color: #1a1a2e; }
  .qty-input.has-value { border-color: #81C784; background: #f9fffe; }
  .remark-input { border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 7px 8px; font-size: 12px; outline: none; width: 100%; color: #555; transition: border 0.2s; }
  .remark-input:focus { border-color: #1a1a2e; }
  .col-header { display: grid; grid-template-columns: 1fr 90px 80px 100px; gap: 8px; padding: 8px 20px; background: #f9f9f9; border-top: 1px solid #f0f0f0; }
  .col-header span { font-size: 10px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.4px; }
  .col-header span:nth-child(3), .col-header span:nth-child(4) { text-align: center; }
  .weekly-legend { display: flex; align-items: center; gap: 6px; padding: 8px 24px; background: #f1faf1; border-bottom: 1px solid #e0f0e0; font-size: 12px; color: #2e7d32; font-weight: 600; }
  .submit-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e8e8e8; padding: 14px 24px; display: flex; gap: 12px; align-items: center; box-shadow: 0 -4px 20px rgba(0,0,0,0.08); }
  .submit-btn { flex: 1; background: #1a1a2e; color: white; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px; }
  .submit-btn:hover { background: #2d2d50; }
  .submit-btn:disabled { background: #aaa; cursor: not-allowed; }
  .submit-btn.success { background: #4CAF50; }
  .filled-count { font-size: 12px; color: #aaa; white-space: nowrap; text-align: right; }
  .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: white; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
  @media (max-width: 500px) {
    .item-row { grid-template-columns: 1fr 70px 70px; }
    .col-header { grid-template-columns: 1fr 70px 70px; }
    .remark-input { display: none; }
    .col-header span:last-child { display: none; }
    .meta-bar { flex-direction: column; }
  }
</style>
</head>

<div class="header">
  <h1>🍹 A'REST Bar Stock Check</h1>
  <p>Damansara Uptown</p>
</div>

<div class="meta-bar">
  <div class="meta-field">
    <label>Staff Name</label>
    <input type="text" id="staffName" placeholder="Enter your name">
  </div>
  <div class="meta-field">
    <label>Check Type</label>
    <select id="checkType" onchange="applyCheckType()">

    </select>
  </div>
  <div class="meta-field">
    <label>Date</label>
    <input type="date" id="checkDate">
  </div>
</div>

<div class="weekly-legend">
  <div style="width:9px;height:9px;border-radius:50%;background:#4CAF50;flex-shrink:0;"></div>
  Green highlighted rows = Weekly check items
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div class="content" id="content"></div>

<div class="submit-bar">

  <button class="submit-btn" id="submitBtn" onclick="submitForm()">Submit Stock Check</button>

const formData = {};
let collapsed = {};
let currentCheckType = 'Weekly';

function init() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('checkDate').value = today;
  const nav = document.getElementById('supplierNav');
  const content = document.getElementById('content');

  SUPPLIERS.forEach((sup, si) => {
    collapsed[si] = false;

    const pill = document.createElement('div');
    pill.className = 'nav-pill';
    pill.id = `pill-${si}`;
    pill.textContent = sup.name;
    pill.onclick = () => document.getElementById(`sup-${si}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
    nav.appendChild(pill);

    const block = document.createElement('div');
    block.className = 'supplier-block';
    block.id = `sup-${si}`;

    const hdr = document.createElement('div');
    hdr.className = 'supplier-header';
    hdr.innerHTML = `
      <h2>${sup.name}</h2>
      <div class="supplier-meta">
        <span class="supplier-count" id="count-${si}">${sup.items.length} items</span>
        <span class="supplier-badge" id="badge-${si}">0/${sup.items.length}</span>
        <span class="chevron open" id="chev-${si}">▼</span>
      </div>`;
    hdr.onclick = () => toggleSupplier(si);
    block.appendChild(hdr);

    const colHdr = document.createElement('div');
    colHdr.className = 'col-header';
    colHdr.id = `colhdr-${si}`;
    colHdr.innerHTML = `<span>Item</span><span>Unit</span><span>Qty</span><span>Remarks</span>`;
    block.appendChild(colHdr);

    const list = document.createElement('div');
    list.className = 'item-list';
    list.id = `list-${si}`;

    sup.items.forEach((item, ii) => {
      const key = `${si}-${ii}`;
      formData[key] = { qty: '', remark: '' };
      const row = document.createElement('div');
      row.className = 'item-row' + (item.w ? ' weekly' : '');
      row.id = `row-${key}`;
      row.innerHTML = `
        <span class="item-name">${item.w ? '<span class="weekly-dot"></span>' : ''} ${item.name}</span>
        <span class="unit-badge">${item.unit || '—'}</span>
        <input class="qty-input" type="number" min="0" step="0.01" placeholder="0"
               oninput="updateQty('${key}', this.value)" id="qty-${key}">
        <input class="remark-input" type="text" placeholder="Remark..."
               oninput="updateRemark('${key}', this.value)" id="rem-${key}">`;
      list.appendChild(row);
    });

    block.appendChild(list);
    content.appendChild(block);
  });

  applyCheckType();
}

function applyCheckType() {
  currentCheckType = document.getElementById('checkType').value;
  SUPPLIERS.forEach((sup, si) => {
    let visibleCount = 0;
    sup.items.forEach((item, ii) => {
      const row = document.getElementById(`row-${si}-${ii}`);
      if (!row) return;
      const show = currentCheckType === 'Monthly' || item.w;
      row.classList.toggle('hidden', !show);
      if (show) visibleCount++;
    });
    const countEl = document.getElementById(`count-${si}`);
    if (countEl) countEl.textContent = `${visibleCount} items`;
  });
  updateProgress();
}

function toggleSupplier(si) {
  collapsed[si] = !collapsed[si];
  document.getElementById(`list-${si}`).style.display = collapsed[si] ? 'none' : '';
  document.getElementById(`colhdr-${si}`).style.display = collapsed[si] ? 'none' : '';
  document.getElementById(`chev-${si}`).classList.toggle('open', !collapsed[si]);
}

function updateQty(key, val) {
  formData[key].qty = val;
  const input = document.getElementById(`qty-${key}`);
  const row = document.getElementById(`row-${key}`);
  input.classList.toggle('has-value', val !== '');
  row.classList.toggle('filled', val !== '');
  updateProgress();
}

function updateRemark(key, val) { formData[key].remark = val; }

function updateProgress() {
  let total = 0, filled = 0;
  SUPPLIERS.forEach((sup, si) => {
    let supFilled = 0, supVisible = 0;
    sup.items.forEach((item, ii) => {
      if (currentCheckType === 'Weekly' && !item.w) return;
      supVisible++; total++;
      const k = `${si}-${ii}`;
      if (formData[k] && formData[k].qty !== '') { filled++; supFilled++; }
    });
    const badge = document.getElementById(`badge-${si}`);
    const pill = document.getElementById(`pill-${si}`);
    if (badge) {
      badge.textContent = `${supFilled}/${supVisible}`;
      badge.className = 'supplier-badge' + (supFilled === supVisible && supVisible > 0 ? ' done' : '');
    }
    if (pill) pill.className = 'nav-pill' + (supFilled === supVisible && supVisible > 0 ? ' done' : '');
  });
  const pct = total > 0 ? (filled / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${filled} / ${total} items filled`;
  document.getElementById('filledCount').textContent = `${filled}/${total} filled`;
}

function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

async function submitForm() {
  const staffName = document.getElementById('staffName').value.trim();
  const checkType = document.getElementById('checkType').value;
  const checkDate = document.getElementById('checkDate').value;
  if (!staffName) { showToast('⚠️ Please enter your name before submitting.'); return; }
  if (!checkDate) { showToast('⚠️ Please select a date.'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  const rows = [];
  SUPPLIERS.forEach((sup, si) => {
    sup.items.forEach((item, ii) => {
      if (currentCheckType === 'Weekly' && !item.w) return;
      const k = `${si}-${ii}`;
      rows.push({
        supplier: sup.name,
        item: item.name,
        unit: item.unit || '',
        qty: formData[k].qty,
        remark: formData[k].remark,
        cog: ''
      });
    });
  });

  const payload = { staffName, checkType, checkDate, rows, submittedAt: new Date().toISOString() };

  // --- REPLACE THIS WITH YOUR GOOGLE APPS SCRIPT WEB APP URL ---
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx3wgL8W_vg53dRQwBaUvhyrlvQJbwAvPkGh4KLmaTeIliLwDLOn7CzBa2SVKqfO3z8/exec';

  if (SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
    console.log('Payload:', JSON.stringify(payload, null, 2));
    setTimeout(() => {
      btn.disabled = false;
      btn.classList.add('success');
      btn.textContent = '✓ Submitted (Demo Mode)';
      showToast('✅ Demo mode — connect Google Sheets to go live!', 4000);
      setTimeout(() => { btn.classList.remove('success'); btn.textContent = 'Submit Stock Check'; }, 4000);
    }, 800);
    return;
  }

  try {
    const form = new FormData();
    form.append('payload', JSON.stringify(payload));
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: form });
    btn.disabled = false;
    btn.classList.add('success');
    btn.textContent = '✓ Submitted!';
    showToast('✅ Stock check submitted successfully!', 3000);
    setTimeout(() => { btn.classList.remove('success'); btn.textContent = 'Submit Stock Check'; }, 4000);
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Submit Stock Check';
    showToast('❌ Submission failed. Check your connection.', 3000);
  }
}

init();
</script>
